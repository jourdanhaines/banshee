# banshee configuration
# https://github.com/jourdanhaines/banshee

# Comma-separated list of directories to search for git repositories
search_paths = ~/dev,~/projects,~/src

# Maximum directory depth to search for .git folders
max_depth = 5

# Keybinding to launch banshee (ctrl-f, ctrl-g, ctrl-b, ctrl-p, ctrl-o)
keybind = ctrl-f

# Additional fzf options (passed directly to fzf)
# fzf_opts = --color=16

# How long (in seconds) to cache the repository list before rescanning
cache_ttl = 300

# On shell startup, prompt to restore saved sessions if running tmux sessions
# don't match the saved set. Set to false to disable.
startup_prompt = true
